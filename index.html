<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Pro - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS INTEGRADO PARA QUE NO TE FALLES */
        :root {
            --bg-dark: #050505;
            --accent: #00ff88;
            --accent-alt: #60efff;
            --text-main: #ffffff;
            --text-dim: #a1a1a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 255, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(96, 239, 255, 0.15) 0px, transparent 50%);
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 30px 10%;
            align-items: center;
        }

        .logo { font-weight: 900; font-size: 1.5rem; }
        .logo span { color: var(--accent); }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        .hero-content { max-width: 700px; }

        h1 {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .text-gradient {
            background: linear-gradient(90deg, var(--accent), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .primary-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>
    <div class="mesh-gradient"></div>
    <nav>
        <div class="logo">CORE<span>X</span></div>
    </nav>
    <main class="hero">
        <div class="hero-content">
            <h1>Crea el futuro <br> <span class="text-gradient">sin límites.</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Si lees esto con colores, es porque ya funcionó. Dale con todo.</p>
            <button class="primary-btn">Empezar ahora</button>
        </div>
    </main>
</body>
</html>
